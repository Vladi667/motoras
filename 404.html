<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="description" content="Pagina nu a fost găsită – Motoraș."/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>404 – Pagina nu a fost găsită – Motoraș</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Nunito+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--red:#cc1111;--dark:#0f1116}body{font-family:'Nunito Sans',sans-serif;background:var(--dark);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}a{text-decoration:none}
/* ── Info pages design upgrade ── */
:root {
  --red:#c8100e;--red2:#a30d0b;--dark:#0d0f14;--dark2:#13161f;
  --mid:#505568;--muted:#8892a0;--border:#e4e8ef;--bg:#edf0f5;
  --gold:#e09618;--green:#18955f;
  --shadow:0 4px 20px rgba(0,0,0,.07);
}
body { -webkit-font-smoothing:antialiased; }
.header { box-shadow:0 1px 0 var(--border),0 4px 24px rgba(0,0,0,.05); }
.btn-cart-mini {
  background:var(--red);border-radius:9px;padding:8px 18px;
  font-size:13px;font-weight:800;
  box-shadow:0 4px 14px rgba(200,16,14,.28);
  transition:all .18s;
}
.btn-cart-mini:hover { background:var(--red2);transform:translateY(-1px); }
.page-banner {
  background:linear-gradient(135deg,var(--dark2) 0%,#151929 55%,var(--dark3,#1a1e2a) 100%);
  border-radius:20px;padding:44px 48px;
}
.page-banner h1 { font-size:44px;letter-spacing:-.8px; }
.content-card {
  border-radius:18px;
  box-shadow:var(--shadow);
  border:1.5px solid var(--border);
}
.content-card h2 {
  font-size:20px;letter-spacing:.2px;
  gap:10px;padding-bottom:14px;
}
.content-card p { font-size:14px;line-height:1.85;color:var(--mid); }
.content-card ul li { font-size:14px;line-height:1.75; }
.info-chip {
  border-radius:14px;border:1.5px solid var(--border);
  transition:all .2s;
}
.info-chip:hover { box-shadow:0 6px 24px rgba(0,0,0,.08);transform:translateY(-2px); }
.info-chip-ico {
  width:42px;height:42px;border-radius:11px;
  background:linear-gradient(135deg,rgba(200,16,14,.09),rgba(200,16,14,.04));
  border:1px solid rgba(200,16,14,.10);
}
.info-chip strong { font-size:13.5px;font-weight:800;color:var(--dark); }
.info-chip span { font-size:13px;color:var(--muted); }
.sidebar-card { border-radius:18px;border:1.5px solid var(--border);box-shadow:var(--shadow); }
.faq-item { border-radius:14px;border:1.5px solid var(--border); }
.faq-q { font-size:15px;font-weight:700;color:var(--dark);padding:17px 20px; }
.faq-a { font-size:14px;line-height:1.8;color:var(--mid);padding:0 20px 20px; }
.faq-item.open { border-color:var(--red);box-shadow:0 4px 20px rgba(200,16,14,.08); }
.data-table th { font-size:11px;font-weight:800;letter-spacing:.6px;background:#f8fafc; }
.data-table td { font-size:14px;color:var(--mid); }
.alert { border-radius:10px;font-size:13.5px; }
.footer { background:linear-gradient(180deg,var(--dark2) 0%,#0e1118 100%); }
.footer-col a { font-size:13.5px;color:rgba(255,255,255,.48); }
.footer-col a:hover { color:#fff; }
.footer-col h4 { font-size:11px;letter-spacing:1px;color:rgba(255,255,255,.32); }
.footer-copy { font-size:12px;color:rgba(255,255,255,.18);letter-spacing:.2px; }
.footer-legal a { font-size:12px;color:rgba(255,255,255,.26);font-weight:600;margin-right:14px; }
.footer-legal a:hover { color:rgba(255,255,255,.68); }
.bc-in a { color:var(--muted);font-weight:600; }
.bc-in a:hover { color:var(--red); }
.bc-current { color:var(--dark);font-weight:700; }
.timeline .tl-dot { box-shadow:0 3px 10px rgba(200,16,14,.22); }
.tl-body h4 { font-size:14.5px;font-weight:800; }
.tl-body p { font-size:13.5px;color:var(--mid);line-height:1.75; }
.btn-submit { background:var(--red);box-shadow:0 4px 16px rgba(200,16,14,.28); }
.btn-submit:hover { background:var(--red2);transform:translateY(-1px); }
.form-field input:focus,.form-field textarea:focus { border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,14,.07); }
::selection { background:rgba(200,16,14,.15);color:var(--dark); }
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

</style>
</head>
<body>
<img src="assets/logo.png" style="height:56px;margin-bottom:32px;filter:brightness(0) invert(1);opacity:.8"/>
<div style="font-family:'Barlow Condensed',sans-serif;font-size:110px;font-weight:900;color:var(--red);line-height:1;margin-bottom:14px">404</div>
<div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Pagina nu a fost găsită</div>
<div style="font-size:15px;color:rgba(255,255,255,.5);max-width:380px;line-height:1.75;margin-bottom:36px">Ne pare rău, pagina pe care o cauți nu există sau a fost mutată.</div>
<div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
  <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;background:var(--red);color:#fff;padding:14px 28px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;text-transform:uppercase;letter-spacing:.5px">← Înapoi acasă</a>
  <a href="search.html" style="display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);color:#fff;padding:14px 28px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;border:1px solid rgba(255,255,255,.15)">🔍 Caută produse</a>
</div>
</body></html>
